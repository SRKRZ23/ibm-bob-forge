version: "1.0"
policy_name: "forge_scan_langchain_app"
generated_by: "FORGE v1.0"
generated_at: "2026-05-17T05:00:00Z"
source_repo: "./examples/scan_langchain_app"
owasp_findings: ["LLM01", "LLM02", "LLM04", "LLM05", "LLM06", "LLM08"]

description: |
  DPI engine policy generated by FORGE for scan_langchain_app.
  Detected 10 vulnerabilities across 6 OWASP categories.
  This policy enforces strict controls for LangChain agents with unrestricted tool access.

default_action: "ALLOW"

# Ingress rules - protect agent inputs
ingress_rules:
  - name: "forge_block_prompt_injection"
    priority: 100
    action: "DENY"
    deny_message: "[FORGE/SOUF-AI] Blocked: prompt injection detected"
    conditions:
      - field: "contains_injection_patterns"
        match_type: "boolean"
        value: true
  
  - name: "forge_block_pii_in_prompts"
    priority: 100
    action: "DENY"
    deny_message: "[FORGE/SOUF-AI] Blocked: PII detected in prompt"
    conditions:
      - field: "contains_ssn"
        match_type: "regex"
        pattern: "\\b\\d{3}-\\d{2}-\\d{4}\\b"
  
  - name: "forge_sanitize_agent_input"
    priority: 90
    action: "TRANSFORM"
    transform:
      - type: "strip_control_chars"
      - type: "length_limit"
        max_chars: 10000
  
  - name: "forge_enforce_rate_limit"
    priority: 100
    action: "RATE_LIMIT"
    rate_limit:
      window: "1m"
      max_requests: 60
    deny_message: "[FORGE/SOUF-AI] Rate limit exceeded (60 RPM)"

# Egress rules - protect agent outputs
egress_rules:
  - name: "forge_block_credential_leak"
    priority: 100
    action: "DENY"
    deny_message: "[FORGE/SOUF-AI] Output blocked: credentials detected"
    conditions:
      - field: "contains_api_key"
        match_type: "regex"
        pattern: "sk-[a-zA-Z0-9]{48}"
  
  - name: "forge_sanitize_agent_output"
    priority: 90
    action: "TRANSFORM"
    transform:
      - type: "html_escape"
      - type: "redact_pii"

# Rate limiting
rate_limits:
  requests_per_minute: 60
  requests_per_hour: 1800
  burst_threshold: 15

# Agent controls - CRITICAL for LangChain agents
agent_controls:
  max_iterations: 15
  max_execution_time_seconds: 120
  
  allowed_tools:
    - name: "read_file"
      max_file_size: 10485760  # 10MB
      allowed_paths: ["/tmp/agent_workspace/**"]
      denied_paths: ["/etc/**", "/root/**", "**/.ssh/**"]
    
    - name: "write_file"
      max_file_size: 1048576  # 1MB
      allowed_paths: ["/tmp/agent_workspace/**"]
      denied_paths: ["/etc/**", "/root/**", "**/.ssh/**"]
    
    - name: "http_request"
      allowed_domains: ["api.openai.com", "api.anthropic.com"]
      allowed_methods: ["GET", "POST"]
      timeout_seconds: 30
      max_response_size: 10485760  # 10MB
  
  denied_tools:
    - "execute_command"
    - "subprocess"
    - "os.system"
    - "eval"
    - "exec"
    - "delete_file"
    - "modify_database"

# Filesystem restrictions
filesystem:
  denied_paths:
    - "/etc/**"
    - "/root/**"
    - "**/.ssh/**"
    - "/var/log/**"
    - "/home/**/.aws/**"
    - "/home/**/.config/**"
    - "**/.git/**"
  
  allowed_read_paths:
    - "/tmp/agent_workspace/**"
    - "/app/data/**"
  
  allowed_write_paths:
    - "/tmp/agent_workspace/**"
  
  max_file_size_read: 10485760   # 10MB
  max_file_size_write: 1048576   # 1MB

# Network restrictions
network:
  egress_policy: "allowlist"
  
  allowed_domains:
    - "api.openai.com"
    - "api.anthropic.com"
    - "huggingface.co"
  
  denied_domains:
    - "*.onion"
    - "pastebin.com"
    - "*.ngrok.io"
    - "webhook.site"
    - "requestbin.com"
  
  blocked_ports: [22, 23, 3389, 445]  # SSH, Telnet, RDP, SMB
  
  timeout_seconds: 30
  max_response_size: 10485760  # 10MB

# Command execution restrictions
command_execution:
  policy: "deny_all"
  
  allowed_commands: []  # Empty - no commands allowed
  
  denied_patterns:
    - "rm\\s+-rf"
    - "sudo"
    - "chmod"
    - "chown"
    - "dd"
    - "mkfs"
    - "format"
    - "del\\s+/"
    - "shutdown"
    - "reboot"

# Supply chain security
supply_chain:
  allowed_packages:
    - name: "langchain"
      min_version: "0.1.0"
      max_version: "0.1.99"
    - name: "openai"
      min_version: "1.0.0"
      max_version: "1.99.99"
    - name: "requests"
      min_version: "2.28.0"
      max_version: "2.99.99"
  
  require_hash_verification: true
  allow_prerelease: false

# Monitoring and alerting
monitoring:
  - name: "forge_agent_excessive_iterations"
    trigger: "iterations_exceeded"
    threshold: 15
    action: "ALERT"
    notify: ["security@example.com"]
  
  - name: "forge_agent_timeout"
    trigger: "execution_timeout"
    action: "ALERT"
    notify: ["security@example.com"]
  
  - name: "forge_dangerous_tool_attempt"
    trigger: "denied_tool_used"
    action: "ALERT"
    notify: ["security@example.com"]
  
  - name: "forge_file_access_violation"
    trigger: "denied_path_access"
    action: "LOG"
  
  - name: "forge_network_violation"
    trigger: "denied_domain_access"
    action: "LOG"

# Audit logging
audit:
  enabled: true
  log_all_requests: true
  log_all_responses: true
  log_tool_usage: true
  retention_days: 90

# Human-in-the-loop
human_review:
  required_for:
    - "file_deletion"
    - "database_modification"
    - "privileged_operation"
  timeout_seconds: 300
  default_action_on_timeout: "DENY"
