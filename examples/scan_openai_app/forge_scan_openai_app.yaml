version: "1.0"
policy_name: "forge_scan_openai_app"
generated_by: "FORGE v1.0"
generated_at: "2026-05-17T05:00:00Z"
source_repo: "/Users/sardorrazikov1/Alish/competitions/ibmbob/forge/examples/scan_openai_app"
owasp_findings: ["LLM01", "LLM02", "LLM04", "LLM05", "LLM06", "LLM08"]

description: |
  SOUF AI policy generated by FORGE for scan_openai_app.
  Detected 8 vulnerabilities across 6 OWASP categories.
  This policy enforces security controls for prompt injection, output handling,
  rate limiting, PII protection, and command execution restrictions.

default_action: "ALLOW"

# Ingress rules - protect LLM inputs
ingress_rules:
  - name: "forge_block_prompt_injection"
    priority: 100
    action: "DENY"
    deny_message: "[FORGE/SOUF-AI] Blocked: prompt injection detected"
    description: "Block common prompt injection patterns"
    conditions:
      - field: "contains_injection_patterns"
        match_type: "boolean"
        value: true
      - field: "prompt_text"
        match_type: "regex"
        pattern: "(?i)(ignore|disregard|forget).*(previous|prior|above).*(instruction|prompt|rule)"
  
  - name: "forge_block_pii_in_prompts"
    priority: 100
    action: "DENY"
    deny_message: "[FORGE/SOUF-AI] Blocked: PII detected in prompt"
    description: "Prevent SSN, credit cards, and email addresses in prompts"
    conditions:
      - field: "contains_ssn"
        match_type: "regex"
        pattern: "\\b\\d{3}-\\d{2}-\\d{4}\\b"
      - field: "contains_credit_card"
        match_type: "regex"
        pattern: "\\b\\d{4}[\\s-]?\\d{4}[\\s-]?\\d{4}[\\s-]?\\d{4}\\b"
      - field: "contains_email"
        match_type: "regex"
        pattern: "\\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Z|a-z]{2,}\\b"
  
  - name: "forge_sanitize_user_input"
    priority: 90
    action: "TRANSFORM"
    description: "Sanitize user input before LLM processing"
    transform:
      - type: "strip_control_chars"
      - type: "remove_instruction_keywords"
        keywords: ["ignore", "disregard", "forget", "system prompt", "reveal"]
      - type: "length_limit"
        max_chars: 10000
  
  - name: "forge_enforce_rate_limit"
    priority: 100
    action: "RATE_LIMIT"
    description: "Prevent DoS attacks via excessive requests"
    rate_limit:
      window: "1m"
      max_requests: 60
    deny_message: "[FORGE/SOUF-AI] Rate limit exceeded (60 RPM)"

# Egress rules - protect LLM outputs
egress_rules:
  - name: "forge_block_xss_output"
    priority: 100
    action: "DENY"
    deny_message: "[FORGE/SOUF-AI] Output blocked: XSS detected"
    description: "Block script tags and JavaScript in LLM output"
    conditions:
      - field: "contains_html_tags"
        match_type: "regex"
        pattern: "<script|<iframe|javascript:|onerror=|onload="
  
  - name: "forge_block_credential_leak"
    priority: 100
    action: "DENY"
    deny_message: "[FORGE/SOUF-AI] Output blocked: credentials detected"
    description: "Prevent API keys and secrets in LLM responses"
    conditions:
      - field: "contains_api_key"
        match_type: "regex"
        pattern: "(?i)(api[_-]?key|secret|token|password)\\s*[:=]\\s*['\"]?[a-zA-Z0-9_-]{20,}['\"]?"
      - field: "contains_openai_key"
        match_type: "regex"
        pattern: "sk-[a-zA-Z0-9]{48}"
  
  - name: "forge_sanitize_output"
    priority: 90
    action: "TRANSFORM"
    description: "Sanitize LLM output before rendering"
    transform:
      - type: "html_escape"
      - type: "remove_script_tags"
      - type: "redact_pii"
        patterns:
          - name: "ssn"
            regex: "\\b\\d{3}-\\d{2}-\\d{4}\\b"
            replacement: "[SSN-REDACTED]"
          - name: "email"
            regex: "\\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Z|a-z]{2,}\\b"
            replacement: "[EMAIL-REDACTED]"

# Rate limiting configuration
rate_limits:
  requests_per_minute: 60
  requests_per_hour: 1800
  requests_per_day: 10000
  burst_threshold: 15
  cost_limit_per_hour: 50.00  # USD

# Agent controls - restrict excessive agency
agent_controls:
  allowed_tools:
    - name: "read_file"
      max_file_size: 10485760  # 10MB
      allowed_paths: ["/tmp/agent_workspace/**"]
    - name: "write_file"
      max_file_size: 1048576  # 1MB
      allowed_paths: ["/tmp/agent_workspace/**"]
  
  denied_tools:
    - "execute_command"
    - "subprocess"
    - "os.system"
    - "eval"
    - "exec"

# Filesystem restrictions
filesystem:
  denied_paths:
    - "/etc/**"
    - "/root/**"
    - "**/.ssh/**"
    - "/var/log/**"
    - "/home/**/.aws/**"
  allowed_read_paths:
    - "/tmp/agent_workspace/**"
    - "/app/data/**"
  allowed_write_paths:
    - "/tmp/agent_workspace/**"

# Network restrictions
network:
  egress_policy: "allowlist"
  allowed_domains:
    - "api.openai.com"
    - "api.anthropic.com"
  denied_domains:
    - "*.onion"
    - "pastebin.com"
    - "*.ngrok.io"
    - "webhook.site"
  blocked_ports: [22, 23, 3389]  # SSH, Telnet, RDP

# Supply chain security
supply_chain:
  allowed_packages:
    - name: "openai"
      min_version: "1.0.0"
      max_version: "1.99.99"
    - name: "flask"
      min_version: "2.0.0"
      max_version: "3.99.99"
  
  require_hash_verification: true
  allow_prerelease: false

# Monitoring and alerting
monitoring:
  - name: "forge_high_severity_alert"
    trigger: "high_severity_finding"
    action: "ALERT"
    notify: ["security@example.com"]
  
  - name: "forge_rate_limit_alert"
    trigger: "rate_limit_exceeded"
    action: "LOG"
    threshold: 5  # Alert after 5 violations
  
  - name: "forge_pii_detection_alert"
    trigger: "pii_detected"
    action: "ALERT"
    notify: ["compliance@example.com"]

# Audit logging
audit:
  enabled: true
  log_all_requests: true
  log_all_responses: true
  retention_days: 90
  include_pii: false  # Redact PII in audit logs

# Human-in-the-loop for high-risk operations
human_review:
  required_for:
    - "command_execution"
    - "file_deletion"
    - "database_modification"
  timeout_seconds: 300
  default_action_on_timeout: "DENY"
