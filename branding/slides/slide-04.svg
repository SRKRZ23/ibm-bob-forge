<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <!-- Background -->
  <rect width="1920" height="1080" fill="#FFFFFF"/>
  <!-- Left stripe -->
  <rect x="0" y="0" width="12" height="1080" fill="#2563EB"/>
  <!-- Top line -->
  <rect x="12" y="0" width="1908" height="4" fill="#2563EB"/>
  <!-- Bottom line -->
  <rect x="12" y="1076" width="1908" height="4" fill="#0A0A0A"/>

  <!-- IBM Bob logo box top-left -->
  <rect x="60" y="20" width="120" height="40" fill="#ED1C24" rx="4"/>
  <text x="120" y="46" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">IBM Bob</text>

  <!-- lablab.ai logo box top-right -->
  <rect x="1740" y="20" width="120" height="40" fill="#0A0A0A" rx="4"/>
  <text x="1800" y="46" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">lablab.ai</text>

  <!-- Slide number -->
  <text x="1860" y="50" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#5A5A5A" text-anchor="end">04 / 08</text>

  <!-- Context label -->
  <text x="960" y="90" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#2563EB" text-anchor="middle" letter-spacing="3">4-STEP IBM BOB PIPELINE · &lt;30ms END-TO-END · LOBSTER TRAP COMPATIBLE</text>

  <!-- Title -->
  <text x="960" y="148" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="38" font-weight="900" fill="#0A0A0A" text-anchor="middle">IBM Bob reads the repo. FORGE generates the policy.</text>

  <!-- Divider -->
  <rect x="60" y="168" width="1800" height="3" fill="#2563EB" rx="1"/>

  <!-- Input label -->
  <rect x="60" y="196" width="360" height="42" fill="#F4F4F4" rx="6" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="60" y="196" width="6" height="42" fill="#5A5A5A" rx="2"/>
  <text x="244" y="222" font-family="Courier New, monospace" font-size="14" font-weight="700" fill="#5A5A5A" text-anchor="middle">INPUT: GitHub URL / local path</text>

  <!-- Output label -->
  <rect x="1500" y="196" width="360" height="42" fill="#F4F4F4" rx="6" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="1854" y="196" width="6" height="42" fill="#2563EB" rx="2"/>
  <text x="1680" y="222" font-family="Courier New, monospace" font-size="12" font-weight="700" fill="#2563EB" text-anchor="middle">OUTPUT: forge_[repo].yaml + BobShell log</text>

  <!-- === PIPELINE 4 BOXES === -->

  <!-- Box 1: SCAN -->
  <rect x="60" y="268" width="400" height="380" fill="#0A0A0A" rx="8"/>
  <rect x="60" y="268" width="400" height="8" fill="#2563EB" rx="4"/>
  <!-- Step number -->
  <text x="260" y="316" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="52" font-weight="900" fill="#2563EB" text-anchor="middle">01</text>
  <!-- Step label -->
  <text x="260" y="368" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="36" font-weight="900" fill="#FFFFFF" text-anchor="middle">SCAN</text>
  <rect x="100" y="382" width="320" height="3" fill="#2563EB" opacity="0.5"/>
  <text x="260" y="418" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#CCCCCC" text-anchor="middle">Bob reads all files,</text>
  <text x="260" y="444" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#CCCCCC" text-anchor="middle">full repo context</text>
  <!-- Sub details -->
  <text x="260" y="490" font-family="Courier New, monospace" font-size="13" fill="#2563EB" text-anchor="middle">· Every file parsed</text>
  <text x="260" y="512" font-family="Courier New, monospace" font-size="13" fill="#2563EB" text-anchor="middle">· LLM call sites located</text>
  <text x="260" y="534" font-family="Courier New, monospace" font-size="13" fill="#2563EB" text-anchor="middle">· Imports analyzed</text>
  <text x="260" y="570" font-family="Courier New, monospace" font-size="12" fill="#5A5A5A" text-anchor="middle">ibm.com/bob</text>
  <text x="260" y="590" font-family="Courier New, monospace" font-size="12" fill="#5A5A5A" text-anchor="middle">IBM Bob API</text>
  <text x="260" y="616" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#888888" text-anchor="middle">~5–10ms</text>

  <!-- Arrow 1→2 -->
  <polygon points="480,448 520,428 520,468" fill="#2563EB"/>
  <rect x="460" y="442" width="60" height="12" fill="#2563EB" rx="2"/>

  <!-- Box 2: DETECT -->
  <rect x="520" y="268" width="400" height="380" fill="#1A1A2E" rx="8"/>
  <rect x="520" y="268" width="400" height="8" fill="#ED1C24" rx="4"/>
  <text x="720" y="316" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="52" font-weight="900" fill="#ED1C24" text-anchor="middle">02</text>
  <text x="720" y="368" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="36" font-weight="900" fill="#FFFFFF" text-anchor="middle">DETECT</text>
  <rect x="560" y="382" width="320" height="3" fill="#ED1C24" opacity="0.5"/>
  <text x="720" y="418" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#CCCCCC" text-anchor="middle">LLM call sites +</text>
  <text x="720" y="444" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#CCCCCC" text-anchor="middle">OWASP Top 10 mapping</text>
  <text x="720" y="490" font-family="Courier New, monospace" font-size="13" fill="#ED1C24" text-anchor="middle">· LLM01 Prompt Injection</text>
  <text x="720" y="512" font-family="Courier New, monospace" font-size="13" fill="#ED1C24" text-anchor="middle">· LLM06 Data Disclosure</text>
  <text x="720" y="534" font-family="Courier New, monospace" font-size="13" fill="#ED1C24" text-anchor="middle">· 10 categories total</text>
  <text x="720" y="570" font-family="Courier New, monospace" font-size="12" fill="#5A5A5A" text-anchor="middle">owasp.org/llm-top-10</text>
  <text x="720" y="616" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#888888" text-anchor="middle">~8–12ms</text>

  <!-- Arrow 2→3 -->
  <polygon points="940,448 980,428 980,468" fill="#2563EB"/>
  <rect x="920" y="442" width="60" height="12" fill="#2563EB" rx="2"/>

  <!-- Box 3: FORGE — highlighted -->
  <rect x="980" y="268" width="400" height="380" fill="#2563EB" rx="8"/>
  <rect x="980" y="268" width="400" height="8" fill="#FFFFFF" rx="4"/>
  <text x="1180" y="316" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="52" font-weight="900" fill="#FFFFFF" text-anchor="middle">03</text>
  <text x="1180" y="368" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="36" font-weight="900" fill="#FFFFFF" text-anchor="middle">FORGE</text>
  <rect x="1020" y="382" width="320" height="3" fill="#FFFFFF" opacity="0.5"/>
  <text x="1180" y="418" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#FFFFFF" text-anchor="middle">SOUF AI YAML policy</text>
  <text x="1180" y="444" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#FFFFFF" text-anchor="middle">generation</text>
  <text x="1180" y="490" font-family="Courier New, monospace" font-size="13" fill="#FFFFFF" text-anchor="middle" opacity="0.9">· ingress/egress rules</text>
  <text x="1180" y="512" font-family="Courier New, monospace" font-size="13" fill="#FFFFFF" text-anchor="middle" opacity="0.9">· Lobster Trap compatible</text>
  <text x="1180" y="534" font-family="Courier New, monospace" font-size="13" fill="#FFFFFF" text-anchor="middle" opacity="0.9">· ISO 42001 aligned</text>
  <text x="1180" y="570" font-family="Courier New, monospace" font-size="12" fill="#FFFFFF" text-anchor="middle" opacity="0.7">github.com/SRKRZ23/forge</text>
  <text x="1180" y="616" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="18" fill="#FFFFFF" text-anchor="middle">★ KEY STEP</text>

  <!-- Arrow 3→4 -->
  <polygon points="1400,448 1440,428 1440,468" fill="#2563EB"/>
  <rect x="1380" y="442" width="60" height="12" fill="#2563EB" rx="2"/>

  <!-- Box 4: AUDIT -->
  <rect x="1440" y="268" width="420" height="380" fill="#0A0A0A" rx="8"/>
  <rect x="1440" y="268" width="420" height="8" fill="#22C55E" rx="4"/>
  <text x="1650" y="316" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="52" font-weight="900" fill="#22C55E" text-anchor="middle">04</text>
  <text x="1650" y="368" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="36" font-weight="900" fill="#FFFFFF" text-anchor="middle">AUDIT</text>
  <rect x="1480" y="382" width="340" height="3" fill="#22C55E" opacity="0.5"/>
  <text x="1650" y="418" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#CCCCCC" text-anchor="middle">SHA-256 BobShell</text>
  <text x="1650" y="444" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#CCCCCC" text-anchor="middle">hash chain</text>
  <text x="1650" y="490" font-family="Courier New, monospace" font-size="13" fill="#22C55E" text-anchor="middle">· Tamper-evident log</text>
  <text x="1650" y="512" font-family="Courier New, monospace" font-size="13" fill="#22C55E" text-anchor="middle">· chain_verified: True</text>
  <text x="1650" y="534" font-family="Courier New, monospace" font-size="13" fill="#22C55E" text-anchor="middle">· EU AI Act Art. 9</text>
  <text x="1650" y="570" font-family="Courier New, monospace" font-size="12" fill="#5A5A5A" text-anchor="middle">src/audit/bobshell.py</text>
  <text x="1650" y="616" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#888888" text-anchor="middle">~2–4ms</text>

  <!-- Lobster Trap verification -->
  <rect x="60" y="678" width="1800" height="72" fill="#F4F4F4" rx="6" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="60" y="678" width="7" height="72" fill="#22C55E" rx="2"/>
  <text x="84" y="706" font-family="Courier New, monospace" font-size="15" font-weight="700" fill="#0A0A0A">Verified:</text>
  <text x="200" y="706" font-family="Courier New, monospace" font-size="15" fill="#2563EB">lobstertrap serve --policy forge_atlas.yaml</text>
  <text x="84" y="734" font-family="Courier New, monospace" font-size="14" fill="#22C55E">→ Serving :8080 with 4 ingress + 2 egress rules — policy loaded, enforcing live traffic</text>

  <!-- Speed hero -->
  <text x="960" y="840" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="96" font-weight="900" fill="#2563EB" text-anchor="middle" opacity="0.07">&lt;30ms</text>

  <!-- Timing summary -->
  <text x="960" y="870" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#0A0A0A" text-anchor="middle">Total pipeline: SCAN + DETECT + FORGE + AUDIT = 19–27ms across all 3 repos</text>

  <!-- Source -->
  <text x="60" y="1055" font-family="Courier New, monospace" font-size="12" fill="#5A5A5A">Verified: python src/cli/__main__.py demo · src/forge.py · Lobster Trap veeainc/lobstertrap · github.com/SRKRZ23/forge</text>
</svg>
