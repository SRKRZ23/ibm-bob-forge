<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <!-- Background -->
  <rect width="1920" height="1080" fill="#FFFFFF"/>
  <rect x="0" y="0" width="12" height="1080" fill="#2563EB"/>
  <rect x="12" y="0" width="1908" height="4" fill="#2563EB"/>
  <rect x="12" y="1076" width="1908" height="4" fill="#0A0A0A"/>

  <!-- IBM Bob top-left -->
  <rect x="60" y="20" width="120" height="40" fill="#ED1C24" rx="4"/>
  <text x="120" y="46" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">IBM Bob</text>

  <!-- lablab.ai top-right -->
  <rect x="1740" y="20" width="120" height="40" fill="#0A0A0A" rx="4"/>
  <text x="1800" y="46" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">lablab.ai</text>

  <text x="1700" y="50" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#5A5A5A" text-anchor="end">02 / 08</text>

  <!-- Context label -->
  <text x="960" y="90" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#2563EB" text-anchor="middle" letter-spacing="3">IBM 2025 · CISCO 2025 · OWASP LLM TOP 10 v2 · ALL VERIFIED CITATIONS</text>

  <!-- Hero number -->
  <text x="210" y="200" font-family="Arial Black, Impact, Arial, Helvetica, sans-serif" font-size="110" font-weight="900" fill="#ED1C24" text-anchor="middle" opacity="0.12">97%</text>

  <!-- Red sub-headline (VERIFIED) -->
  <text x="960" y="148" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#ED1C24" text-anchor="middle">97% of breached organizations lacked proper AI access controls. (IBM 2025)</text>

  <!-- Main headline -->
  <text x="960" y="196" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="34" font-weight="900" fill="#0A0A0A" text-anchor="middle">IBM Bob reads your code. Nobody automates the policy. Until FORGE.</text>

  <rect x="60" y="216" width="1800" height="3" fill="#2563EB" rx="1"/>

  <!-- CARD 1 — IBM Cost of a Data Breach 2025 -->
  <rect x="60" y="232" width="570" height="300" fill="#F4F4F4" rx="6" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="60" y="232" width="7" height="300" fill="#ED1C24" rx="2"/>
  <text x="84" y="262" font-family="Courier New, monospace" font-size="11" font-weight="700" fill="#ED1C24" letter-spacing="2">IBM COST OF A DATA BREACH 2025 · JUL 2025</text>
  <rect x="84" y="270" width="520" height="2" fill="#ED1C24" opacity="0.3"/>
  <text x="84" y="298" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#0A0A0A">63% of breached orgs have</text>
  <text x="84" y="322" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#0A0A0A">no AI governance policy.</text>
  <text x="84" y="346" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#0A0A0A">13% suffered AI model breaches.</text>
  <text x="84" y="370" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#ED1C24">Shadow AI adds +$670K per breach.</text>
  <rect x="84" y="386" width="520" height="1" fill="#CCCCCC"/>
  <text x="84" y="406" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#5A5A5A">Annual gold-standard breach economics</text>
  <text x="84" y="424" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#5A5A5A">report — 600+ orgs surveyed, audited</text>
  <text x="84" y="442" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#5A5A5A">incidents over 12 months.</text>
  <text x="84" y="475" font-family="Courier New, monospace" font-size="10" fill="#ED1C24">→ ibm.com/reports/data-breach</text>
  <text x="84" y="492" font-family="Courier New, monospace" font-size="10" fill="#ED1C24">→ newsroom.ibm.com (Jul 30, 2025 press release)</text>

  <!-- CARD 2 — Cisco State of AI Security 2025 -->
  <rect x="674" y="232" width="572" height="300" fill="#F4F4F4" rx="6" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="674" y="232" width="7" height="300" fill="#2563EB" rx="2"/>
  <text x="698" y="262" font-family="Courier New, monospace" font-size="11" font-weight="700" fill="#2563EB" letter-spacing="2">CISCO STATE OF AI SECURITY · 2025</text>
  <rect x="698" y="270" width="522" height="2" fill="#2563EB" opacity="0.3"/>
  <text x="698" y="298" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#0A0A0A">86% of business leaders saw</text>
  <text x="698" y="322" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#0A0A0A">an AI security incident in 2024.</text>
  <text x="698" y="346" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#0A0A0A">60% cannot track shadow AI.</text>
  <text x="698" y="370" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#2563EB">Only 13% feel deployment-ready.</text>
  <rect x="698" y="386" width="522" height="1" fill="#CCCCCC"/>
  <text x="698" y="406" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#5A5A5A">8,000 respondents across 30 markets.</text>
  <text x="698" y="424" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#5A5A5A">Cisco 2025 Cybersecurity Readiness</text>
  <text x="698" y="442" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#5A5A5A">Index — most cited industry baseline.</text>
  <text x="698" y="475" font-family="Courier New, monospace" font-size="10" fill="#2563EB">→ cisco.com/site/us/en/products/security/</text>
  <text x="698" y="492" font-family="Courier New, monospace" font-size="10" fill="#2563EB">→ state-of-ai-security.html</text>

  <!-- CARD 3 — OWASP Gen AI Security Project -->
  <rect x="1290" y="232" width="570" height="300" fill="#F4F4F4" rx="6" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="1290" y="232" width="7" height="300" fill="#0A0A0A" rx="2"/>
  <text x="1314" y="262" font-family="Courier New, monospace" font-size="11" font-weight="700" fill="#0A0A0A" letter-spacing="2">OWASP TOP 10 FOR LLMs · 2025 v2</text>
  <rect x="1314" y="270" width="520" height="2" fill="#0A0A0A" opacity="0.3"/>
  <text x="1314" y="298" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#0A0A0A">LLM01 Prompt Injection — #1</text>
  <text x="1314" y="322" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#0A0A0A">risk 2 years running.</text>
  <text x="1314" y="346" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#0A0A0A">10 risk categories. Every team</text>
  <text x="1314" y="370" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#0A0A0A">must address them. Manually.</text>
  <rect x="1314" y="386" width="520" height="1" fill="#CCCCCC"/>
  <text x="1314" y="406" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#5A5A5A">Maintained by OWASP Gen AI Security</text>
  <text x="1314" y="424" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#5A5A5A">Project. v4.2.0a published Nov 2024.</text>
  <text x="1314" y="442" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#5A5A5A">Zero auto-remediation tools exist.</text>
  <text x="1314" y="475" font-family="Courier New, monospace" font-size="10" fill="#0A0A0A">→ genai.owasp.org/llmrisk/llm01-prompt-injection/</text>

  <rect x="60" y="558" width="1800" height="2" fill="#2563EB" rx="1"/>

  <!-- Bottom black bar — FORGE closes the gap -->
  <rect x="60" y="568" width="1800" height="120" fill="#0A0A0A" rx="6"/>
  <rect x="60" y="568" width="7" height="120" fill="#2563EB" rx="2"/>
  <text x="90" y="606" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#2563EB" letter-spacing="2">FORGE CLOSES THE GAP:</text>
  <text x="90" y="636" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#FFFFFF">IBM Bob scans repo context → OWASP detection → YAML policy → BobShell SHA-256 audit trail.</text>
  <text x="90" y="664" font-family="Courier New, monospace" font-size="20" font-weight="700" fill="#2563EB">Under 30ms. 90/90 tests PASS. Zero manual steps. ISO/IEC 42001:2023 aligned.</text>

  <!-- OWASP mini tags -->
  <rect x="60" y="706" width="140" height="28" fill="#ED1C24" rx="3"/>
  <text x="130" y="724" font-family="Courier New, monospace" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">LLM01</text>
  <rect x="210" y="706" width="140" height="28" fill="#ED1C24" rx="3"/>
  <text x="280" y="724" font-family="Courier New, monospace" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">LLM02</text>
  <rect x="360" y="706" width="140" height="28" fill="#ED1C24" rx="3"/>
  <text x="430" y="724" font-family="Courier New, monospace" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">LLM05</text>
  <rect x="510" y="706" width="140" height="28" fill="#ED1C24" rx="3"/>
  <text x="580" y="724" font-family="Courier New, monospace" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">LLM06</text>
  <rect x="660" y="706" width="140" height="28" fill="#ED1C24" rx="3"/>
  <text x="730" y="724" font-family="Courier New, monospace" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">LLM08</text>
  <text x="830" y="724" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#5A5A5A">+ 5 more — all 10 OWASP LLM 2025 categories auto-detected by FORGE</text>

  <!-- Big hero stat -->
  <text x="1700" y="780" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="100" font-weight="900" fill="#2563EB" text-anchor="middle" opacity="0.08">27ms</text>

  <text x="960" y="800" font-family="Courier New, monospace" font-size="14" fill="#5A5A5A" text-anchor="middle">Verified: python src/cli/__main__.py demo → ATLAS 7 findings, CITADEL 6 findings, FORGE 10 findings</text>

  <!-- Sources (FULL CITATIONS) -->
  <text x="60" y="1040" font-family="Courier New, monospace" font-size="11" font-weight="700" fill="#0A0A0A">Sources (all verified, public, retrievable):</text>
  <text x="60" y="1058" font-family="Courier New, monospace" font-size="10" fill="#5A5A5A">IBM Cost of a Data Breach Report 2025 (ibm.com/reports/data-breach, Jul 2025) · Cisco State of AI Security 2025 (cisco.com/site/us/en/products/security/state-of-ai-security.html) · OWASP Top 10 for LLMs 2025 v2 (genai.owasp.org)</text>
