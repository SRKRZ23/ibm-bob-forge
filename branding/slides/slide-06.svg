  <rect x="60" y="228" width="7" height="110" fill="#2563EB" rx="2"/>
  <text x="84" y="256" font-family="Courier New, monospace" font-size="12" font-weight="700" fill="#2563EB" letter-spacing="2">BOBSHELL HASH FORMULA</text>
  <text x="84" y="286" font-family="Courier New, monospace" font-size="14" fill="#0A0A0A">entry_hash = sha256(</text>
  <text x="84" y="308" font-family="Courier New, monospace" font-size="14" fill="#0A0A0A">  seq + timestamp + action + params +</text>
  <text x="84" y="330" font-family="Courier New, monospace" font-size="14" fill="#0A0A0A">  output_hash + prev_hash</text>
  <text x="84" y="352" font-family="Courier New, monospace" font-size="14" fill="#0A0A0A">)</text>

