  <rect x="60" y="354" width="780" height="56" fill="#2563EB" rx="4"/>
  <text x="84" y="376" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF">1. Every action creates an entry with SHA-256 hash</text>
  <text x="84" y="398" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF">   of its content + previous entry hash</text>

  <rect x="60" y="420" width="780" height="56" fill="#1A1A2E" rx="4"/>
  <text x="84" y="442" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#CCCCCC">2. Chain links: entry N references hash of entry N-1</text>
  <text x="84" y="464" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#2563EB">   Merkle-style tamper detection</text>

