  <text x="1004" y="329" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">✓  Bob reads full repo context (every file)</text>

  <rect x="984" y="356" width="736" height="44" fill="#FFFFFF" rx="4" opacity="0.07"/>
  <text x="1004" y="383" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">✓  Detects all 10 OWASP LLM categories</text>

  <rect x="984" y="410" width="736" height="44" fill="#FFFFFF" rx="4" opacity="0.1"/>
  <text x="1004" y="437" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">✓  Generates Lobster Trap-compatible YAML</text>

  <rect x="984" y="464" width="736" height="44" fill="#FFFFFF" rx="4" opacity="0.07"/>
  <text x="1004" y="491" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">✓  BobShell: SHA-256 hash-chained audit trail</text>

  <rect x="984" y="518" width="736" height="44" fill="#FFFFFF" rx="4" opacity="0.1"/>
  <text x="1004" y="545" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">✓  Every action tamper-evidently logged</text>

  <rect x="984" y="572" width="736" height="44" fill="#FFFFFF" rx="4" opacity="0.07"/>
  <text x="1004" y="599" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">✓  95/95 tests PASS · 3-repo live demo</text>

  <rect x="984" y="626" width="736" height="44" fill="#FFFFFF" rx="4" opacity="0.1"/>
  <text x="1004" y="653" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">✓  Lobster Trap serve verified: policy loaded</text>

