  <rect x="984" y="686" width="736" height="66" fill="#0A0A0A" rx="6"/>
  <text x="1352" y="726" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="36" font-weight="900" fill="#2563EB" text-anchor="middle">27ms  ·  end-to-end</text>

