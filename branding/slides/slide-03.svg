  <text x="200" y="816" font-family="Courier New, monospace" font-size="14" fill="#2563EB">python src/cli/__main__.py demo</text>
  <text x="90" y="838" font-family="Courier New, monospace" font-size="13" fill="#5A5A5A">→ ATLAS 7 findings, CITADEL 6 findings, FORGE 10 findings · All BobShell chains verified</text>

