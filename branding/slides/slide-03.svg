  <text x="60" y="1055" font-family="Courier New, monospace" font-size="12" fill="#5A5A5A">Sources: ibm.com/bob · owasp.org/www-project-top-10-for-large-language-model-applications · github.com/SRKRZ23/ibm-bob-forge</text>
