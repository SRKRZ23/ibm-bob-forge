<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#0F62FE"/>
    </linearGradient>
  </defs>

  <!-- Solid background (will be cropped to circle by YouTube) -->
  <rect width="800" height="800" fill="url(#bgGrad)"/>

  <!-- Subtle circuit grid overlay -->
  <g opacity="0.08">
    <line x1="100" y1="100" x2="700" y2="100" stroke="#FFF" stroke-width="2"/>
    <line x1="100" y1="700" x2="700" y2="700" stroke="#FFF" stroke-width="2"/>
    <line x1="100" y1="100" x2="100" y2="700" stroke="#FFF" stroke-width="2"/>
    <line x1="700" y1="100" x2="700" y2="700" stroke="#FFF" stroke-width="2"/>
    <circle cx="100" cy="100" r="8" fill="#FFF"/>
    <circle cx="700" cy="100" r="8" fill="#FFF"/>
    <circle cx="100" cy="700" r="8" fill="#FFF"/>
    <circle cx="700" cy="700" r="8" fill="#FFF"/>
  </g>

  <!-- F letterform (centered, large) -->
  <!-- Vertical bar -->
  <rect x="250" y="180" width="80" height="440" fill="#FFFFFF"/>
  <!-- Top horizontal bar -->
  <rect x="250" y="180" width="320" height="80" fill="#FFFFFF"/>
  <!-- Middle horizontal bar -->
  <rect x="250" y="370" width="250" height="68" fill="#FFFFFF"/>

  <!-- Circuit accent: top-right corner -->
  <circle cx="570" cy="220" r="14" fill="#FFFFFF" opacity="0.35"/>
  <line x1="540" y1="220" x2="570" y2="220" stroke="#FFFFFF" stroke-width="3" opacity="0.35"/>

  <!-- Circuit accent: middle-right -->
  <circle cx="540" cy="404" r="12" fill="#FFFFFF" opacity="0.35"/>

  <!-- Circuit accent: bottom-right -->
  <circle cx="370" cy="600" r="10" fill="#FFFFFF" opacity="0.35"/>
  <line x1="370" y1="600" x2="370" y2="630" stroke="#FFFFFF" stroke-width="3" opacity="0.35"/>
  <circle cx="370" cy="640" r="6" fill="#FFFFFF" opacity="0.35"/>
</svg>
