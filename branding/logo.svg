<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <!-- Background -->
  <rect width="400" height="400" fill="#FFFFFF"/>

  <!-- Left vertical accent stripe -->
  <rect x="0" y="0" width="8" height="400" fill="#2563EB"/>

  <!-- Main blue box -->
  <rect x="50" y="50" width="300" height="220" fill="#2563EB" rx="6"/>

  <!-- "F" letterform inside box -->
  <!-- Vertical bar -->
  <rect x="110" y="80" width="28" height="160" fill="#FFFFFF"/>
  <!-- Top horizontal bar -->
  <rect x="110" y="80" width="120" height="28" fill="#FFFFFF"/>
  <!-- Middle horizontal bar -->
  <rect x="110" y="156" width="90" height="24" fill="#FFFFFF"/>

  <!-- Circuit/gear motif: corner dots -->
  <circle cx="78" cy="76" r="5" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="322" cy="76" r="5" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="78" cy="244" r="5" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="322" cy="244" r="5" fill="#FFFFFF" opacity="0.4"/>

  <!-- Circuit lines decoration -->
  <line x1="270" y1="90" x2="310" y2="90" stroke="#FFFFFF" stroke-width="2" opacity="0.3"/>
  <line x1="310" y1="90" x2="310" y2="120" stroke="#FFFFFF" stroke-width="2" opacity="0.3"/>
  <circle cx="310" cy="120" r="4" fill="#FFFFFF" opacity="0.3"/>

  <line x1="270" y1="230" x2="310" y2="230" stroke="#FFFFFF" stroke-width="2" opacity="0.3"/>
  <line x1="310" y1="230" x2="310" y2="200" stroke="#FFFFFF" stroke-width="2" opacity="0.3"/>
  <circle cx="310" cy="200" r="4" fill="#FFFFFF" opacity="0.3"/>

  <!-- Small gear motif top-right -->
  <circle cx="298" cy="90" r="14" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.25"/>
  <circle cx="298" cy="90" r="7" fill="#FFFFFF" opacity="0.2"/>
  <!-- gear teeth -->
  <rect x="295" y="72" width="6" height="6" fill="#FFFFFF" opacity="0.2" rx="1"/>
  <rect x="295" y="102" width="6" height="6" fill="#FFFFFF" opacity="0.2" rx="1"/>
  <rect x="280" y="87" width="6" height="6" fill="#FFFFFF" opacity="0.2" rx="1"/>
  <rect x="312" y="87" width="6" height="6" fill="#FFFFFF" opacity="0.2" rx="1"/>

  <!-- Hammer/anvil accent shape bottom-right of box -->
  <!-- Anvil base -->
  <rect x="248" y="195" width="60" height="10" fill="#FFFFFF" opacity="0.35" rx="2"/>
  <!-- Anvil top -->
  <rect x="253" y="183" width="50" height="14" fill="#FFFFFF" opacity="0.35" rx="2"/>
  <!-- Hammer handle -->
  <rect x="279" y="155" width="6" height="30" fill="#FFFFFF" opacity="0.35" rx="2"/>
  <!-- Hammer head -->
  <rect x="268" y="148" width="28" height="12" fill="#FFFFFF" opacity="0.5" rx="2"/>

  <!-- FORGE wordmark -->
  <text x="200" y="318" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-weight="900" font-size="64" fill="#0A0A0A" text-anchor="middle" letter-spacing="8">FORGE</text>

  <!-- Tagline -->
  <text x="200" y="355" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-weight="400" font-size="14" fill="#5A5A5A" text-anchor="middle" letter-spacing="3">LLM SECURITY SCANNER</text>

  <!-- IBM Bob badge -->
  <rect x="134" y="368" width="132" height="22" fill="#0A0A0A" rx="3"/>
  <text x="200" y="383" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-weight="700" font-size="11" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">IBM Bob Powered</text>
</svg>
